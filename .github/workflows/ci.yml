name: CI

# Build check for pull requests — required for Renovate automerge to have
# a green signal before merging dependency updates.
on:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: PATH_PREFIX=/wgmt/ npx eleventy
